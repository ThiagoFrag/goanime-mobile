workflows:
  ios-unsigned:
    name: GoAnime iOS unsigned
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Materialize .env
        script: |
          set -e
          if [ -n "$DOTENV" ]; then
            printf '%s' "$DOTENV" > .env
          else
            cp .env.example .env
          fi
      - name: Flutter packages
        script: flutter pub get
      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos
        ignore_failure: true
      - name: Pod install
        script: |
          cd ios
          pod install --repo-update
      - name: Build iOS via xcodebuild (no signing)
        script: |
          set -e
          # Flutter prep (generates Generated.xcconfig + assets); xcodebuild
          # below replaces the signing-required final step that flutter wraps.
          flutter build ios --release --no-codesign --config-only || true

          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            build
      - name: Package unsigned .ipa
        script: |
          set -e
          APP_PATH=$(find ios/build -path "*Release-iphoneos/Runner.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Runner.app not found"
            find ios/build -name "Runner.app" -type d || true
            exit 1
          fi
          echo "Runner.app: $APP_PATH"
          OUT_DIR="build/ios/iphoneos"
          PAYLOAD_DIR="$OUT_DIR/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/Runner.app"
          (cd "$OUT_DIR" && zip -qr goanime-unsigned.ipa Payload)
          ls -lh "$OUT_DIR/goanime-unsigned.ipa"
    artifacts:
      - build/ios/iphoneos/goanime-unsigned.ipa
